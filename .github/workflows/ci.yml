name: CI

on:
    push:
        branches:
            - development
            - main

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: "actions/checkout@v2"
            - uses: "shivammathur/setup-php@v2"
              with:
                  php-version: 8.4

            - run: |
                  composer update
                  composer test
